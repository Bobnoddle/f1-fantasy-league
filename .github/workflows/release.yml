name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for changelog

    - name: Generate Release Notes
      id: changelog
      run: |
        # Get the current and previous tag
        CURRENT_TAG=${GITHUB_REF#refs/tags/}
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${CURRENT_TAG}^ 2>/dev/null || echo "")
        
        # Generate changelog
        if [ -z "$PREVIOUS_TAG" ]; then
          # First release
          CHANGELOG=$(git log --oneline --no-decorate)
        else
          CHANGELOG=$(git log --oneline ${PREVIOUS_TAG}..${CURRENT_TAG})
        fi
        
        # Write to output
        {
          echo "CHANGELOG<<EOF"
          echo "## What's Changed"
          echo ""
          echo "$CHANGELOG"
          echo ""
          echo "**Full Changelog:** https://github.com/Bobnoddle/f1-fantasy-league/compare/${PREVIOUS_TAG}...${GITHUB_REF#refs/tags/}"
          echo "EOF"
        } >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        body: ${{ steps.changelog.outputs.CHANGELOG }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
